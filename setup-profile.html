<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Setup - CarbonWise</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth.js" defer></script>
  <script src="js/setup-profile.js" defer></script>
</head>
<body>

  <header class="navbar">
    <h2>CarbonWise Profile Setup</h2>
    <nav>
      <a href="login.html">Login</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <h1 class="center">📝 Complete Your Profile</h1>

  <div class="container">
    <div class="card" style="max-width:500px; margin:auto;">
      <form id="setupForm">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Full Name" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="Email" readonly>

        <label>Username</label>
        <input type="text" id="username" placeholder="Username" readonly>

        <label>Country</label>
        <input type="text" id="country" placeholder="Country or Location" required>

        <button type="submit">Save Profile</button>
      </form>
      <p id="status" style="margin-top:10px;color:#00ff00;"></p>
    </div>
  </div>

</body>
</html>
