<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile - CarbonWise</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/auth.js" defer></script>
  <script src="js/edit-profile.js" defer></script>
</head>
<body>
  <header class="navbar">
    <h2>CarbonWise Edit Profile</h2>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="calculator.html">Calculator</a>
      <a href="history.html">History</a>
      <a href="goals.html">Goals</a>
      <a href="profile.html">Profile</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <h1 class="center">✏️ Edit Profile</h1>
  <div class="container">
    <div class="card" style="max-width:500px; margin:auto;">
      <form id="editProfileForm">
        <label>Username</label>
        <input type="text" id="editUsername" placeholder="Username" required>

        <label>Email</label>
        <input type="email" id="editEmail" placeholder="Email" required>

        <label>Role</label>
        <select id="editRole">
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>

        <div style="display:flex; justify-content:space-between; gap:10px; margin-top:15px;">
          <button type="submit" style="width:100%;">Save</button>
          <button type="button" id="cancelEdit" style="width:100%;">Cancel</button>
        </div>
      </form>
      <p id="editStatus" style="margin-top:10px;color:#00ff00;"></p>
    </div>
  </div>

</body>
</html>
