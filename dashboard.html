<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CarbonWise Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/charts.js" defer></script>
  <script src="js/auth.js" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h2>CarbonWise Dashboard</h2>
    <nav>
      <a href="calculator.html">Calculator</a>
      <a href="history.html">History</a>
      <a href="goals.html">Goals</a>
      <a href="profile.html">Profile</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <h1 class="center">📊 Dashboard Overview</h1>

  <div class="dashboard container">
    <div class="card">
      <h3>Total Carbon Emission</h3>
      <p id="totalEmission">0 kg CO2</p>
    </div>
    <div class="card">
      <h3>Green Score</h3>
      <p id="greenScore">0</p>
    </div>
  </div>

  <!-- Category Breakdown Chart -->
  <div class="chart-container container">
    <div class="card">
      <canvas id="categoryBreakdownChart" style="max-width:100%;"></canvas>
    </div>
  </div>

  <!-- Trend Chart -->
  <div class="chart-container container">
    <div class="card">
      <canvas id="trendChart" style="max-width:100%; margin-top:20px;"></canvas>
    </div>
  </div>

  <script>
    protectPage("user"); // Ensure only logged-in users can access
  </script>

</body>
</html>
